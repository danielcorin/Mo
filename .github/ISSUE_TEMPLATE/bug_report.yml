name: Bug report
description: Report a reproducible problem with Mo.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Mo.
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: macOS 15.5
    validations:
      required: true
  - type: input
    id: mo
    attributes:
      label: Mo version
      placeholder: 1.0.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include what you expected and what happened instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open…
        2. Configure…
        3. Press…
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include display/notch details, screenshots, logs, or relevant menu-bar apps when useful.
