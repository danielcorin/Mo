name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Test
        run: >-
          xcodebuild
          -project Mo.xcodeproj
          -scheme Mo
          -destination 'platform=macOS'
          CODE_SIGNING_ALLOWED=NO
          test
      - name: Build universal Release
        run: >-
          xcodebuild
          -project Mo.xcodeproj
          -scheme Mo
          -configuration Release
          -destination 'generic/platform=macOS'
          ARCHS='arm64 x86_64'
          ONLY_ACTIVE_ARCH=NO
          CODE_SIGNING_ALLOWED=NO
          build
